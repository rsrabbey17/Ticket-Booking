# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration - Check these values
spring.datasource.url=jdbc:mysql://localhost:3306/ticket_booking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# IMPORTANT: Change this to your actual MySQL password
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

